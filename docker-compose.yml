services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9094:9094"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - sh
      - -lc
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic fleet.telemetry --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic fleet.alerts --partitions 1 --replication-factor 1

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: infra/php/web/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
    environment:
      APP_ENV: development
      APP_NAME: Smart Fleet Command
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FLEET_VEHICLE_COUNT: 30
      FLEET_TOPIC_TELEMETRY: fleet.telemetry
      FLEET_TOPIC_ALERTS: fleet.alerts

  simulator:
    build:
      context: .
      dockerfile: infra/php/worker/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app
    environment:
      APP_ENV: development
      APP_NAME: Smart Fleet Command
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FLEET_VEHICLE_COUNT: 30
      FLEET_TOPIC_TELEMETRY: fleet.telemetry
      FLEET_TOPIC_ALERTS: fleet.alerts
      SIMULATION_MIN_INTERVAL: 10
      SIMULATION_MAX_INTERVAL: 30
      SIMULATION_TICK_SECONDS: 1
    command: ["php", "/app/bin/simulator.php"]

  projector:
    build:
      context: .
      dockerfile: infra/php/worker/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app
    environment:
      APP_ENV: development
      APP_NAME: Smart Fleet Command
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FLEET_VEHICLE_COUNT: 30
      FLEET_TOPIC_TELEMETRY: fleet.telemetry
      FLEET_TOPIC_ALERTS: fleet.alerts
    command: ["php", "/app/bin/projector.php"]

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: smart-fleet
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
